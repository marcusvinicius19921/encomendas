<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Encomendas">
<meta name="theme-color" content="#7F77DD">
<title>Encomendas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f7;--bg3:#ebebed;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#ababab;
  --border:#e0e0e0;--border2:#cacaca;
  --purple:#7F77DD;--purple2:#534AB7;
  --green-bg:#EAF3DE;--green-text:#3B6D11;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;--amber-border:#FAC775;--amber-dark:#633806;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --gray-bg:#F1EFE8;--gray-text:#5F5E5A;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#ababab;--text3:#6b6b6b;
    --border:#3a3a3c;--border2:#48484a;
    --green-bg:#1a2e0f;--green-text:#a8d57a;
    --amber-bg:#2e1f05;--amber-text:#f0b860;--amber-border:#7a5010;--amber-dark:#f0c070;
    --red-bg:#2e0f0f;--red-text:#f07070;
    --gray-bg:#2c2c2e;--gray-text:#ababab;
  }
}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text)}
.app{min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg2)}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* STATUS BAR AREA */
.statusbar{height:env(safe-area-inset-top,0px);background:var(--bg)}

/* HEADER */
.header{background:var(--bg);padding:12px 16px 10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:600;color:var(--text);flex:1}
.header-icon{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:18px}
.back-btn{width:38px;height:38px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center}

/* CONTENT */
.content{padding:14px 14px}

/* TABS */
.tabs{display:flex;gap:6px;padding:12px 14px 0;background:var(--bg)}
.tab{flex:1;padding:8px 4px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:.15s}
.tab.active{background:var(--purple);border-color:var(--purple);color:#fff}

/* NOTIF BANNER */
.notif-banner{background:var(--amber-bg);border:0.5px solid var(--amber-border);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.notif-banner i{color:var(--amber-text);font-size:18px;margin-top:1px;flex-shrink:0}
.notif-text{font-size:13px;color:var(--amber-dark);line-height:1.4}

/* CARDS */
.card-enc{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.15s;-webkit-user-select:none}
.card-enc:active{transform:scale(0.98);background:var(--bg2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-nome{font-size:15px;font-weight:600;color:var(--text)}
.card-produto{font-size:13px;color:var(--text2);margin-top:2px}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.badge-ok{background:var(--green-bg);color:var(--green-text)}
.badge-alerta{background:var(--amber-bg);color:var(--amber-text)}
.badge-urgente{background:var(--red-bg);color:var(--red-text)}
.badge-entregue{background:var(--gray-bg);color:var(--gray-text)}
.card-info{display:flex;gap:12px;flex-wrap:wrap}
.card-info span{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}

/* FORM */
.form-content{padding:14px}
.input-group{margin-bottom:14px}
.input-group label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.input-group input,.input-group select,.input-group textarea{
  width:100%;padding:11px 13px;border-radius:var(--radius);
  border:0.5px solid var(--border2);background:var(--bg);color:var(--text);
  font-size:15px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none
}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--purple)}
.input-group textarea{resize:none;height:80px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sinal-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;margin-bottom:14px}
.sinal-label{font-size:15px;color:var(--text)}
.toggle{position:relative;width:50px;height:28px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tog-slider{position:absolute;inset:0;background:var(--border2);border-radius:14px;transition:.2s;cursor:pointer}
.tog-slider:before{content:'';position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.tog-slider{background:var(--purple)}
input:checked+.tog-slider:before{transform:translateX(22px)}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:var(--radius-lg);font-size:16px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:active{background:var(--purple2)}
.btn-outline{background:transparent;border:0.5px solid var(--border2);color:var(--text)}
.btn-outline:active{background:var(--bg2)}
.btn-danger{background:var(--red-bg);color:var(--red-text);border:none}
.btn-success{background:var(--green-bg);color:var(--green-text);border:none}
.btn-gap{height:10px}

/* FAB */
.fab-wrap{padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));background:var(--bg2);position:sticky;bottom:0;margin-top:auto;border-top:0.5px solid var(--border)}
.fab{width:100%;padding:15px;border-radius:var(--radius-lg);background:var(--purple);color:#fff;font-size:16px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.fab:active{background:var(--purple2);transform:scale(0.98)}

/* DETAIL */
.detail-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px}
.detail-row{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border);gap:12px}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:14px;color:var(--text2);flex-shrink:0}
.detail-val{font-size:14px;color:var(--text);font-weight:500;text-align:right;word-break:break-word}

/* EMPTY */
.empty{text-align:center;padding:4rem 1rem;color:var(--text2)}
.empty i{font-size:52px;display:block;margin-bottom:12px;opacity:.3;color:var(--text)}
.empty p{font-size:15px}

/* NOTIF BELL DOT */
.bell-wrap{position:relative}
.bell-dot{width:8px;height:8px;background:#E24B4A;border-radius:50%;position:absolute;top:6px;right:6px;border:1.5px solid var(--bg)}

/* SECTION TITLE */
.section-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;margin-top:4px}
</style>
</head>
<body>
<div class="app">

<!-- LISTA -->
<div id="s-lista" class="screen active">
  <div class="statusbar"></div>
  <div class="header">
    <i class="ti ti-cake" style="font-size:24px;color:var(--purple)" aria-hidden="true"></i>
    <h1>Encomendas</h1>
    <div class="header-icon bell-wrap" onclick="abrirNotifs()" id="bell-btn">
      <i class="ti ti-bell" aria-hidden="true"></i>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="filtrarTab(this,'todas')">Todas</button>
    <button class="tab" onclick="filtrarTab(this,'pendente')">Pendentes</button>
    <button class="tab" onclick="filtrarTab(this,'entregue')">Entregues</button>
  </div>
  <div class="content" id="lista-content">
    <div id="notif-area"></div>
    <div id="lista-enc"></div>
  </div>
  <div class="fab-wrap">
    <button class="fab" onclick="abrirNova()">
      <i class="ti ti-plus" aria-hidden="true"></i> Nova encomenda
    </button>
  </div>
</div>

<!-- FORM -->
<div id="s-form" class="screen">
  <div class="statusbar"></div>
  <div class="header">
    <button class="back-btn" onclick="voltar()"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h1 id="form-titulo">Nova encomenda</h1>
  </div>
  <div class="form-content">
    <div class="section-title">Cliente</div>
    <div class="input-group"><label>Nome do cliente *</label><input id="f-nome" type="text" placeholder="Ex: Maria Silva" autocomplete="off"></div>
    <div class="input-group"><label>Telefone</label><input id="f-tel" type="tel" placeholder="(11) 99999-9999"></div>
    <div class="input-group"><label>Endereço de entrega</label><input id="f-end" type="text" placeholder="Rua, número, bairro" autocomplete="off"></div>

    <div class="section-title" style="margin-top:6px">Produto</div>
    <div class="row2">
      <div class="input-group"><label>Tipo</label>
        <select id="f-tipo">
          <option>🎂 Bolo</option>
          <option>🥐 Salgado</option>
          <option>🎂🥐 Bolo + Salgado</option>
          <option>🧁 Cupcake</option>
          <option>🍮 Doce</option>
          <option>🎁 Outro</option>
        </select>
      </div>
      <div class="input-group"><label>Valor total (R$)</label><input id="f-valor" type="number" placeholder="0,00" min="0" step="0.01" inputmode="decimal"></div>
    </div>

    <div class="section-title" style="margin-top:6px">Entrega</div>
    <div class="row2">
      <div class="input-group"><label>Data *</label><input id="f-data" type="date"></div>
      <div class="input-group"><label>Horário</label><input id="f-hora" type="time"></div>
    </div>

    <div class="section-title" style="margin-top:6px">Pagamento</div>
    <div class="sinal-row">
      <span class="sinal-label">Sinal pago?</span>
      <label class="toggle"><input id="f-sinal" type="checkbox"><span class="tog-slider"></span></label>
    </div>
    <div class="input-group" id="f-sinal-val-group" style="display:none">
      <label>Valor do sinal (R$)</label>
      <input id="f-sinal-val" type="number" placeholder="0,00" min="0" step="0.01" inputmode="decimal">
    </div>

    <div class="section-title" style="margin-top:6px">Observações</div>
    <div class="input-group"><textarea id="f-obs" placeholder="Sabor, decoração, alergias, tamanho, etc."></textarea></div>

    <button class="btn btn-primary" onclick="salvar()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Salvar encomenda</button>
    <div class="btn-gap"></div>
    <button class="btn btn-danger" id="btn-del" style="display:none" onclick="deletar()"><i class="ti ti-trash" aria-hidden="true"></i> Excluir encomenda</button>
    <div style="height:env(safe-area-inset-bottom,14px)"></div>
  </div>
</div>

<!-- DETALHE -->
<div id="s-detalhe" class="screen">
  <div class="statusbar"></div>
  <div class="header">
    <button class="back-btn" onclick="voltar()"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h1>Detalhe</h1>
    <div class="header-icon" onclick="editarAtual()"><i class="ti ti-edit" aria-hidden="true"></i></div>
  </div>
  <div class="content">
    <div id="detalhe-content"></div>
    <div style="height:env(safe-area-inset-bottom,0px)"></div>
  </div>
</div>

<!-- NOTIFICAÇÕES -->
<div id="s-notif" class="screen">
  <div class="statusbar"></div>
  <div class="header">
    <button class="back-btn" onclick="voltar()"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h1>Notificações</h1>
  </div>
  <div class="content">
    <div id="notif-full"></div>
  </div>
</div>

<script>
let enc = JSON.parse(localStorage.getItem('enc_v2')||'[]');
let editIdx = null;
let tabAtual = 'todas';

function save(){localStorage.setItem('enc_v2',JSON.stringify(enc))}

function dias(dataStr){
  const h=new Date();h.setHours(0,0,0,0);
  return Math.ceil((new Date(dataStr+'T00:00:00')-h)/86400000);
}

function fmtData(s){if(!s)return'-';const[y,m,d]=s.split('-');return d+'/'+m+'/'+y}
function fmtVal(v){return v?'R$ '+parseFloat(v).toFixed(2).replace('.',','):'-'}

function badge(e){
  if(e.entregue)return'<span class="badge badge-entregue">Entregue</span>';
  const d=dias(e.data);
  if(d<0)return'<span class="badge badge-urgente">Atrasada</span>';
  if(d===0)return'<span class="badge badge-urgente">Hoje!</span>';
  if(d<=3)return'<span class="badge badge-alerta">'+d+' dia'+(d>1?'s':'')+' restante'+(d>1?'s':'')+'</span>';
  return'<span class="badge badge-ok">'+d+' dias</span>';
}

function renderLista(){
  const notifArea=document.getElementById('notif-area');
  const listaArea=document.getElementById('lista-enc');
  const bellBtn=document.getElementById('bell-btn');

  let lista=enc;
  if(tabAtual==='pendente')lista=enc.filter(e=>!e.entregue);
  if(tabAtual==='entregue')lista=enc.filter(e=>e.entregue);

  const alertas=enc.filter(e=>{
    if(e.entregue)return false;
    const d=dias(e.data);return d>=0&&d<=3;
  });

  // Bell dot
  bellBtn.innerHTML='<i class="ti ti-bell" aria-hidden="true"></i>'+(alertas.length?'<span class="bell-dot"></span>':'');

  notifArea.innerHTML=alertas.map(e=>{
    const d=dias(e.data);
    const t=d===0?'Entrega HOJE!':d===1?'Entrega amanhã':'Entrega em '+d+' dias';
    return`<div class="notif-banner"><i class="ti ti-bell-ringing" aria-hidden="true"></i><div class="notif-text"><strong>${e.nome}</strong> — ${e.tipo}<br>${t} · ${fmtData(e.data)}${e.hora?' às '+e.hora:''}</div></div>`;
  }).join('');

  if(!lista.length){
    listaArea.innerHTML='<div class="empty"><i class="ti ti-cake" aria-hidden="true"></i><p>'+(tabAtual==='todas'?'Nenhuma encomenda ainda.<br>Toque em <strong>Nova encomenda</strong> para começar!':tabAtual==='pendente'?'Nenhuma encomenda pendente.':'Nenhuma entrega concluída.')+'</p></div>';
    return;
  }

  // Ordenar por data
  const sorted=[...lista].sort((a,b)=>new Date(a.data)-new Date(b.data));
  listaArea.innerHTML=sorted.map(e=>{
    const i=enc.indexOf(e);
    return`<div class="card-enc" onclick="verDetalhe(${i})">
      <div class="card-top">
        <div><div class="card-nome">${e.nome}</div><div class="card-produto">${e.tipo}</div></div>
        ${badge(e)}
      </div>
      <div class="card-info">
        <span><i class="ti ti-calendar" style="font-size:13px" aria-hidden="true"></i>${fmtData(e.data)}${e.hora?' '+e.hora:''}</span>
        ${e.valor?'<span><i class="ti ti-cash" style="font-size:13px" aria-hidden="true"></i>'+fmtVal(e.valor)+'</span>':''}
        ${e.sinal?'<span><i class="ti ti-check" style="font-size:13px" aria-hidden="true"></i>Sinal pago</span>':''}
        ${e.obs?'<span><i class="ti ti-notes" style="font-size:13px" aria-hidden="true"></i>Obs</span>':''}
      </div>
    </div>`;
  }).join('');
}

function filtrarTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');tabAtual=tab;renderLista();
}

function abrirNova(){
  editIdx=null;
  document.getElementById('form-titulo').textContent='Nova encomenda';
  ['f-nome','f-tel','f-end','f-valor','f-data','f-hora','f-obs','f-sinal-val'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-tipo').selectedIndex=0;
  document.getElementById('f-sinal').checked=false;
  document.getElementById('f-sinal-val-group').style.display='none';
  document.getElementById('btn-del').style.display='none';
  mostrar('s-form');
}

function editarAtual(){
  const e=enc[editIdx];
  document.getElementById('form-titulo').textContent='Editar encomenda';
  document.getElementById('f-nome').value=e.nome||'';
  document.getElementById('f-tel').value=e.tel||'';
  document.getElementById('f-end').value=e.end||'';
  document.getElementById('f-tipo').value=e.tipo||'🎂 Bolo';
  document.getElementById('f-valor').value=e.valor||'';
  document.getElementById('f-data').value=e.data||'';
  document.getElementById('f-hora').value=e.hora||'';
  document.getElementById('f-obs').value=e.obs||'';
  document.getElementById('f-sinal').checked=!!e.sinal;
  document.getElementById('f-sinal-val').value=e.sinalVal||'';
  document.getElementById('f-sinal-val-group').style.display=e.sinal?'block':'none';
  document.getElementById('btn-del').style.display='block';
  mostrar('s-form');
}

function salvar(){
  const nome=document.getElementById('f-nome').value.trim();
  const data=document.getElementById('f-data').value;
  if(!nome){alert('Informe o nome do cliente.');return;}
  if(!data){alert('Informe a data de entrega.');return;}
  const e={
    nome,tel:document.getElementById('f-tel').value,
    end:document.getElementById('f-end').value,
    tipo:document.getElementById('f-tipo').value,
    valor:document.getElementById('f-valor').value,
    data,hora:document.getElementById('f-hora').value,
    obs:document.getElementById('f-obs').value,
    sinal:document.getElementById('f-sinal').checked,
    sinalVal:document.getElementById('f-sinal-val').value,
    entregue:editIdx!==null?enc[editIdx].entregue:false
  };
  if(editIdx!==null)enc[editIdx]=e;
  else enc.push(e);
  save();renderLista();voltar();
  agendarNotificacoes();
}

function deletar(){
  if(!confirm('Excluir esta encomenda?'))return;
  enc.splice(editIdx,1);save();renderLista();voltar();
}

function verDetalhe(i){
  editIdx=i;
  const e=enc[i];
  const d=dias(e.data);
  let alerta='';
  if(!e.entregue&&d>=0&&d<=3){
    const t=d===0?'Entrega HOJE!':d===1?'Amanhã!':'Em '+d+' dias';
    alerta=`<div class="notif-banner" style="margin-bottom:14px"><i class="ti ti-bell-ringing" aria-hidden="true"></i><div class="notif-text"><strong>Atenção:</strong> ${t}</div></div>`;
  }
  const linhas=[
    ['Cliente',e.nome],['Telefone',e.tel||'-'],['Endereço',e.end||'-'],
    ['Produto',e.tipo],
    ['Data de entrega',fmtData(e.data)+(e.hora?' às '+e.hora:'')],
    ['Valor total',fmtVal(e.valor)],
    ['Sinal',e.sinal?'Pago'+(e.sinalVal?' ('+fmtVal(e.sinalVal)+')':''):'Não pago'],
    ['Observações',e.obs||'-'],
    ['Status',e.entregue?'✅ Entregue':'⏳ Pendente']
  ];
  document.getElementById('detalhe-content').innerHTML=
    alerta+
    '<div class="detail-card">'+
    linhas.map(r=>`<div class="detail-row"><span class="detail-label">${r[0]}</span><span class="detail-val">${r[1]}</span></div>`).join('')+
    '</div>'+
    `<button class="btn ${e.entregue?'btn-outline':'btn-success'}" style="margin-bottom:10px" onclick="toggleEntregue(${i})">
      <i class="ti ti-${e.entregue?'refresh':'circle-check'}" aria-hidden="true"></i>
      ${e.entregue?'Marcar como pendente':'Marcar como entregue'}
    </button>`+
    `<button class="btn btn-outline" onclick="compartilhar(${i})"><i class="ti ti-share" aria-hidden="true"></i> Compartilhar</button>`;
  mostrar('s-detalhe');
}

function toggleEntregue(i){
  enc[i].entregue=!enc[i].entregue;
  save();verDetalhe(i);renderLista();
}

function compartilhar(i){
  const e=enc[i];
  const txt=`📦 Encomenda\nCliente: ${e.nome}\nProduto: ${e.tipo}\nEntrega: ${fmtData(e.data)}${e.hora?' às '+e.hora:''}\nValor: ${fmtVal(e.valor)}\n${e.obs?'Obs: '+e.obs:''}`.trim();
  if(navigator.share){navigator.share({text:txt})}
  else{navigator.clipboard.writeText(txt).then(()=>alert('Copiado!')).catch(()=>alert(txt))}
}

function abrirNotifs(){
  const alertas=enc.filter(e=>{if(e.entregue)return false;const d=dias(e.data);return d>=0&&d<=3;});
  const area=document.getElementById('notif-full');
  if(!alertas.length){
    area.innerHTML='<div class="empty"><i class="ti ti-bell-off" aria-hidden="true"></i><p>Nenhum aviso no momento.<br>Encomendas com entrega em até<br>3 dias aparecem aqui.</p></div>';
  } else {
    area.innerHTML=alertas.map(e=>{
      const d=dias(e.data);
      const t=d===0?'Entrega HOJE!':d===1?'Entrega amanhã!':'Entrega em '+d+' dias';
      return`<div class="notif-banner"><i class="ti ti-bell-ringing" aria-hidden="true"></i><div class="notif-text"><strong>${e.nome}</strong> — ${e.tipo}<br>${t} · ${fmtData(e.data)}${e.hora?' às '+e.hora:''}<br>Valor: ${fmtVal(e.valor)}</div></div>`;
    }).join('');
  }
  mostrar('s-notif');
}

function mostrar(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop=0;
}

function voltar(){mostrar('s-lista');renderLista();}

// Notificações nativas
async function agendarNotificacoes(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default')await Notification.requestPermission();
  if(Notification.permission!=='granted')return;
  const alertas=enc.filter(e=>{
    if(e.entregue)return false;
    const d=dias(e.data);return d>=0&&d<=3;
  });
  alertas.forEach(e=>{
    const d=dias(e.data);
    const t=d===0?'Entrega HOJE!':d===1?'Entrega amanhã!':'Entrega em '+d+' dias';
    new Notification('🎂 Encomenda: '+e.nome,{body:e.tipo+' · '+t+' · '+fmtData(e.data),icon:''});
  });
}

document.getElementById('f-sinal').addEventListener('change',function(){
  document.getElementById('f-sinal-val-group').style.display=this.checked?'block':'none';
});

// Init
renderLista();
// Solicitar permissão de notificação ao abrir
if('Notification' in window && Notification.permission==='default'){
  setTimeout(()=>Notification.requestPermission(),2000);
}
// Checar alertas a cada hora
setInterval(()=>{renderLista();agendarNotificacoes();},3600000);
</script>
